{% extends "base.html" %}
{% block title %}AI Tutor{% endblock %}
{% block styles %}
  <link rel="stylesheet" href="{{ url_for('static', filename='css/tutor.css') }}">
{% endblock %}
{% block content %}
<h1 class="page-title">NeuroBot — AI Tutor</h1>
<div class="card">
  <div id="chatWindow" class="chat-window">
    <div class="msg ai"><div class="bubble">Hi! I'm NeuroBot 🤖 — your AI tutor. Ask me anything about machine learning!</div></div>
  </div>
  <div class="chat-input-row mt-12">
    <input id="chatInput" class="form-input" placeholder="Ask about CNNs, Transformers, MLOps..." />
    <button class="btn btn-primary" onclick="sendMessage()">Send</button>
  </div>
  <div class="quick-chips mt-8" id="chips">
    <button class="chip" onclick="setInput('What is backpropagation?')">What is backpropagation?</button>
    <button class="chip" onclick="setInput('Explain attention mechanism')">Explain attention mechanism</button>
    <button class="chip" onclick="setInput('How does dropout work?')">How does dropout work?</button>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/tutor.js') }}"></script>
{% endblock %}
