{% extends "base.html" %}
{% block title %}Admin sign in{% endblock %}
{% block styles %}
  <link rel="stylesheet" href="/static/css/dashboard.css">
{% endblock %}

{% block content %}
<div style="max-width:460px;margin:0 auto;">
  <div class="card">
    <p class="section-title">NeuroXLearn — Admin sign in</p>
    <p class="small-hint mb-12">Administrator access only.</p>

    <form id="adminLoginForm" class="flex-col gap-14" autocomplete="on">
      <div>
        <div class="label-muted">Admin email</div>
        <input class="form-input mt-4" type="email" name="email" id="adminEmail" required placeholder="admin@example.com" />
      </div>
      <div>
        <div class="label-muted">Password</div>
        <input class="form-input mt-4" type="password" name="password" id="adminPassword" required placeholder="••••••••" />
      </div>
      <p id="adminLoginErr" class="small-hint" style="color:var(--danger);display:none"></p>
      <button type="submit" class="btn btn-primary" style="width:100%">Sign in as admin →</button>
    </form>

    <p class="mt-16 small-hint" style="text-align:center">
      <a href="/student/login" style="color:var(--muted)">← Student login</a>
      &nbsp;·&nbsp;
      <a href="/" style="color:var(--muted)">Back to home</a>
    </p>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/auth-api.js"></script>
<script src="/static/js/admin-login.js"></script>
{% endblock %}
