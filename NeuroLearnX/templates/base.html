<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NeuroLearnX – {% block title %}Dashboard{% endblock %}</title>

  <!-- Chart.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

  <!-- Global CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/navbar.css') }}">

  <!-- Page-specific CSS -->
  {% block styles %}{% endblock %}
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a class="logo" href="/">⚡ NeuroLearnX</a>
    <div class="nav-links">
      <a href="/"          class="nav-link {% if request.path == '/' %}active{% endif %}">Dashboard</a>
      <a href="/learning"  class="nav-link {% if request.path == '/learning' %}active{% endif %}">Learning Path</a>
      <a href="/lab"       class="nav-link {% if request.path == '/lab' %}active{% endif %}">ML Lab</a>
      <a href="/analytics" class="nav-link {% if request.path == '/analytics' %}active{% endif %}">Analytics</a>
      <a href="/tutor"     class="nav-link {% if request.path == '/tutor' %}active{% endif %}">AI Tutor</a>
      <a href="/quiz"      class="nav-link {% if request.path == '/quiz' %}active{% endif %}">Quizzes</a>
    </div>
    <div class="avatar">RS</div>
  </nav>

  <!-- Page Content -->
  <main class="page-content">
    {% block content %}{% endblock %}
  </main>

  <!-- Page-specific JS -->
  {% block scripts %}{% endblock %}
</body>
</html>
