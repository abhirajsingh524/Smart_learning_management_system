{% extends "lms_base.html" %}
{% block content %}
<div class="lms-shell">
  <aside class="lms-sidebar glass">
    <div class="lms-side-brand">⚡ NeuroX Admin</div>
    <nav class="lms-nav">
      <a href="/lms/admin/dashboard" class="{% if lmsPage == 'dash' %}active{% endif %}">Overview</a>
      <a href="/lms/admin/students" class="{% if lmsPage == 'students' %}active{% endif %}">Students</a>
      <a href="/lms/admin/analytics" class="{% if lmsPage == 'analytics' %}active{% endif %}">Analytics</a>
    </nav>
    <div class="lms-side-foot">
      <button type="button" class="lms-btn-sm" id="lmsAdminLogout" style="width:100%">Log out</button>
    </div>
  </aside>
  <main class="lms-main">
    {% block main %}{% endblock %}
  </main>
</div>
{% endblock %}
